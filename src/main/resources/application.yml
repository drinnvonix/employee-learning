spring:
  application:
    name: employee-learning-tracker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/employee_learning_tracker}
    username: ${DB_USERNAME:etl_user}
    password: ${DB_PASSWORD:etl_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

